<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUX JEWELLERYZ | Home</title>
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Luxury Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,700;1,400&display=swap" rel="stylesheet">
    <!-- THREE.JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --gold: #D4AF37;
            --orange: #FF9800;
            --bg: #050505;
            --card-bg: #0a0a0a;
            --glass-border: rgba(212, 175, 55, 0.25);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: #f5f5f5; font-family: 'Montserrat', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }

        /* --- LOGO STYLING --- */
        .brand-logo { height: 45px; width: auto; object-fit: contain; }
        .sidebar-logo { height: 70px; margin: 0 auto 30px; display: block; filter: drop-shadow(0 0 10px rgba(212,175,55,0.3)); }

        /* --- 3D HERO AREA --- */
        #canvas-container { position: fixed; top: 0; left: 0; width: 100vw; height: 55vh; z-index: 0; pointer-events: none; background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%); }
        .ui-wrapper { position: relative; z-index: 10; padding-bottom: 90px; }

        /* --- SIDEBAR MENU --- */
        .side-menu {
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%;
            background: rgba(5, 5, 5, 0.98); backdrop-filter: blur(25px);
            z-index: 200; transition: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            border-right: 1px solid var(--glass-border); padding: 30px 20px;
        }
        .side-menu.open { left: 0; }
        .menu-item { display: flex; align-items: center; gap: 15px; padding: 15px 0; color: #ddd; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s; }
        .menu-item i { color: var(--gold); width: 20px; text-align: center; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 150; display: none; }
        .overlay.show { display: block; }

        /* --- HEADER --- */
        .app-header { padding: 15px 20px; position: sticky; top: 0; z-index: 100; background: rgba(5,5,5,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--glass-border); }
        .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .search-container { position: relative; width: 100%; }
        .search-bar { width: 100%; padding: 12px 40px 12px 20px; border-radius: 30px; border: 1px solid var(--glass-border); background: #000; color: #fff; outline: none; font-family: 'Montserrat'; }

        /* --- HERO TEXT --- */
        .hero-spacer { width: 100%; height: 35vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; pointer-events: none; }
        .hero-spacer h2 { font-size: 2.5rem; font-family: 'Playfair Display'; color: #fff; text-shadow: 0 5px 15px #000; }
        .hero-spacer h2 span { color: var(--gold); font-style: italic; }

        /* --- PRODUCT GRID --- */
        .content-section { position: relative; z-index: 20; padding: 30px 15px 100px; background: #050505; border-top: 1px solid var(--glass-border); border-radius: 30px 30px 0 0; }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .product-card { background: var(--card-bg); border-radius: 12px; padding: 12px; border: 1px solid rgba(212, 175, 55, 0.15); display: flex; flex-direction: column; transition: 0.3s; cursor: pointer; }
        .card-img { width: 100%; height: 140px; border-radius: 8px; overflow: hidden; margin-bottom: 10px; background: #111; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .grid-title { font-size: 13px; color: #fff; margin-bottom: 5px; font-weight: 500; text-align: center; min-height: 40px; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display'; line-height: 1.2; }
        .grid-price { color: var(--gold); font-weight: 700; font-size: 14px; margin-bottom: 10px; text-align: center; }
        .add-btn { width: 100%; padding: 10px; background: transparent; border: 1px solid var(--gold); color: var(--gold); border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; }

        /* --- PAGINATION --- */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 40px; }
        .page-btn { background: var(--gold); color: #000; border: none; padding: 10px 20px; font-weight: 700; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .page-btn:disabled { opacity: 0.3; }
        #page-info { letter-spacing: 2px; font-weight: 600; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; background: #0a0a0a; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #666; font-size: 9px; font-weight: 600; gap: 5px; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <div class="side-menu" id="side-menu">
        <img src="logo.png" class="sidebar-logo" alt="LOGO" onerror="this.src='https://via.placeholder.com/150x150/000/D4AF37?text=LUX'">
        <div class="menu-item" onclick="filterData('all')"><i class="fas fa-th-large"></i> All Jewelry</div>
        <div class="menu-item" onclick="filterData('Ring')"><i class="fas fa-ring"></i> Rings</div>
        <div class="menu-item" onclick="filterData('Necklace')"><i class="fas fa-link"></i> Necklaces</div>
        <div class="menu-item" onclick="filterData('Watch')"><i class="fas fa-clock"></i> Watches</div>
        <div class="menu-item" onclick="filterData('Earring')"><i class="fas fa-gem"></i> Earrings</div>
    </div>

    <div class="ui-wrapper">
        <header class="app-header">
            <div class="top-row">
                <i class="fas fa-bars" style="color:#fff; cursor:pointer; font-size:22px;" onclick="toggleMenu()"></i>
                <!-- HEADER LOGO -->
                <img src="logo.png" class="brand-logo" alt="LUX" onerror="this.style.display='none'">
                <div class="cart-icon" onclick="window.location.href='cart.html'"><i class="fas fa-shopping-bag"></i><span class="cart-badge" id="cart-count">0</span></div>
            </div>
            <div class="search-container">
                <input type="text" id="main-search" class="search-bar" placeholder="Search creations..." onkeyup="handleSearch()">
                <i class="fas fa-search" style="position:absolute; right:20px; top:50%; transform:translateY(-50%); color:var(--gold);"></i>
            </div>
        </header>

        <div class="hero-spacer">
            <h2>Luxury <span>Redefined</span></h2>
        </div>

        <div class="content-section">
            <h3 id="grid-header-text" style="margin-bottom:25px; font-weight:400; text-align:center; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; font-size: 14px;">The Signature Collection</h3>
            <div class="grid-container" id="grid-container"></div>
            
            <div class="pagination">
                <button class="page-btn" id="prev-btn" onclick="prevPage()">PREV</button>
                <div id="page-info">1 / 4</div>
                <button class="page-btn" id="next-btn" onclick="nextPage()">NEXT</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active"><i class="fas fa-home"></i> HOME</div>
        <div class="nav-item" onclick="window.location.href='cart.html'"><i class="fas fa-shopping-cart"></i> BAG</div>
        <div class="nav-item"><i class="fas fa-heart"></i> LIKED</div>
        <div class="nav-item"><i class="fas fa-user"></i> ME</div>
    </nav><script>
        window.onload = function() {
            // --- 1. LUXURY MAPPING (Backend -> Frontend) ---
            const luxuryMapping = {
                'Ring': ["Imperial Gold Band", "Diamond Eternity", "Onyx Sovereign", "Celestial Solitaire", "Midnight Halo", "Opal Aurora", "Vintage Filigree", "Princess Cut", "Ivy Gilded Band", "Rose Petal Ring"],
                'Necklace': ["Starlight Choker", "Sapphire Drop", "Golden Lariat", "Heirloom Pearl", "Emerald Forest", "Ruby Heart", "Sun Radiant", "Diamond Waterfall", "Silver Lace", "Ethereal Charm"],
                'Watch': ["Grand Tourbillon", "Chrono Noir", "Midnight Rose", "Platinum Elite", "Diamond Premiere", "Astral Steel", "GMT Master", "Skeleton Gold", "Royal Dress", "Modern Quartz"],
                'Earring': ["Diamond Studs", "Sapphire Drops", "Golden Hoops", "Blossom Drops", "Tassel Studs", "Emerald Hoops", "Ruby Victorian", "Star Climbers", "Platinum Bar", "Leaf Studs"]
            };

            const webFallbacks = {
                'Ring': 'https://images.unsplash.com/photo-1605100804763-247f67b2548e?w=400',
                'Necklace': 'https://images.unsplash.com/photo-1599643478524-fb66f7ca265b?w=400',
                'Watch': 'https://images.unsplash.com/photo-1523170335258-f5ed11844a49?w=400',
                'Earring': 'https://images.unsplash.com/photo-1635767798638-3e25273a8236?w=400'
            };

            const products = [];
            const types = ['Ring', 'Necklace', 'Watch', 'Earring'];

            // GENERATE 40 PRODUCTS
            types.forEach(type => {
                for(let i = 1; i <= 10; i++) {
                    let finalPrice = (type === 'Ring' || type === 'Necklace') ? 20000 : (type === 'Earring') ? 25000 : 100000;
                    
                    products.push({
                        id: type + i, // Backend Easy Name (e.g. Ring1)
                        displayName: luxuryMapping[type][i-1], // Real Product Name
                        category: type,
                        price: finalPrice,
                        localImg: type.toLowerCase() + i + '.jpg',
                        webFallback: webFallbacks[type]
                    });
                }
            });

            // --- 2. UI LOGIC ---
            let currentData = products;
            let currentPage = 1;
            const itemsPerPage = 10;

            window.renderGrid = () => {
                const grid = document.getElementById('grid-container');
                const totalPages = Math.ceil(currentData.length / itemsPerPage);
                const start = (currentPage - 1) * itemsPerPage;
                const pageData = currentData.slice(start, start + itemsPerPage);

                grid.innerHTML = pageData.map(p => `
                    <div class="product-card" onclick="openProduct('${p.id}')">
                        <div class="card-img">
                            <img src="${p.localImg}" onerror="this.src='${p.webFallback}'" loading="lazy">
                        </div>
                        <div class="grid-title">${p.displayName}</div>
                        <div class="grid-price">UGX ${p.price.toLocaleString()}</div>
                        <button class="add-btn">View Details</button>
                    </div>
                `).join('');

                document.getElementById('page-info').innerText = `${currentPage} / ${totalPages || 1}`;
                document.getElementById('prev-btn').disabled = (currentPage === 1);
                document.getElementById('next-btn').disabled = (currentPage === totalPages || totalPages === 0);
            };

            window.openProduct = (id) => {
                const product = products.find(p => p.id === id);
                localStorage.setItem('selectedProduct', JSON.stringify(product));
                window.location.href = 'product.html';
            };

            window.toggleMenu = () => {
                document.getElementById('side-menu').classList.toggle('open');
                document.getElementById('overlay').classList.toggle('show');
            };

            window.filterData = (cat) => {
                currentData = (cat === 'all') ? products : products.filter(p => p.category === cat);
                document.getElementById('grid-header-text').innerText = cat === 'all' ? "Signature Collection" : cat + "s";
                currentPage = 1; renderGrid(); toggleMenu();
            };

            window.handleSearch = () => {
                const q = document.getElementById('main-search').value.toLowerCase();
                currentData = products.filter(p => p.displayName.toLowerCase().includes(q) || p.id.toLowerCase().includes(q));
                currentPage = 1; renderGrid();
            };

            window.nextPage = () => { currentPage++; renderGrid(); window.scrollTo(0, 450); };
            window.prevPage = () => { currentPage--; renderGrid(); window.scrollTo(0, 450); };

            renderGrid();

            // --- 3. 3D HERO ENGINE ---
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(50, window.innerWidth / (window.innerHeight * 0.55), 0.1, 1000);
            camera.position.z = 7;
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight * 0.55);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const group = new THREE.Group();
            const gem = new THREE.Mesh(new THREE.IcosahedronGeometry(1.5, 0), new THREE.MeshStandardMaterial({ color: 0xD4AF37, metalness: 0.9, roughness: 0.1, flatShading: true }));
            const wire = new THREE.Mesh(new THREE.IcosahedronGeometry(2.2, 1), new THREE.MeshBasicMaterial({ color: 0xD4AF37, wireframe: true, transparent: true, opacity: 0.2 }));
            group.add(gem); group.add(wire); scene.add(group);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const light = new THREE.PointLight(0xffffff, 1.2); light.position.set(5, 5, 5); scene.add(light);

            function animate() {
                requestAnimationFrame(animate);
                group.rotation.y += 0.005; group.rotation.x += 0.002;
                group.position.y = Math.sin(Date.now() * 0.0015) * 0.2;
                renderer.render(scene, camera);
            }
            animate();
        };
    </script>
</body>
</html>

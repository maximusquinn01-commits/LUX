<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUX | Your Bag</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --orange: #FF9800; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding-bottom: 120px; margin: 0; }
        header { display: flex; align-items: center; padding: 20px; background: #0a0a0a; border-bottom: 1px solid #1a1a1a; gap: 20px; font-weight: bold; letter-spacing: 1px; }
        
        .bag-label { padding: 20px; font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 2px; }
        
        .cart-card { background: #0f0f0f; margin: 0 15px 15px; padding: 15px; border-radius: 12px; border: 1px solid #1a1a1a; display: flex; gap: 15px; align-items: center; position: relative; }
        .item-img { width: 95px; height: 95px; border-radius: 8px; object-fit: cover; background: #111; border: 1px solid #222; }
        .item-info { flex: 1; }
        .item-info h2 { font-size: 15px; margin: 0 0 5px 0; color: #eee; font-weight: 500; }
        .item-info .price { color: var(--gold); font-weight: 700; font-size: 18px; }
        .item-info .mat-tag { font-size: 10px; color: #555; text-transform: uppercase; margin-top: 5px; display: block; }
        
        .remove-icon { position: absolute; top: 15px; right: 15px; color: #333; font-size: 18px; cursor: pointer; }

        footer { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; padding: 20px 15px; border-top: 1px solid #222; box-sizing: border-box; }
        .price-summary { display: flex; justify-content: space-between; margin-bottom: 20px; padding: 0 5px; }
        .checkout-btn { width: 100%; background: var(--orange); color: #fff; border: none; padding: 20px; border-radius: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; font-size: 15px; }
        
        .cod-notice { text-align: center; font-size: 11px; color: #444; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <i class="fas fa-arrow-left" onclick="window.location.href='index.html'"></i>
        MY SHOPPING BAG
    </header>

    <div class="bag-label">Selected Items</div>
    <div id="cart-items-container"></div>

    <footer>
        <div class="price-summary">
            <span style="color:#666; font-size: 14px;">Subtotal:</span>
            <span id="sub-total-val" style="color:var(--gold); font-weight:bold; font-size:22px;">UGX 0</span>
        </div>
        <button class="checkout-btn" id="main-check-btn" onclick="window.location.href='checkout.html'">Checkout Now</button>
        <div class="cod-notice"><i class="fas fa-hand-holding-usd"></i> Pay via Cash on Delivery</div>
    </footer>

    <script>
        function renderBag() {
            const cart = JSON.parse(localStorage.getItem('lux_cart')) || [];
            const container = document.getElementById('cart-items-container');
            let total = 0;

            if(cart.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:100px 20px; color:#333; font-size:18px;"><i class="fas fa-shopping-bag" style="font-size:50px; margin-bottom:20px;"></i><br>Bag is Empty</div>`;
                document.getElementById('main-check-btn').style.display = "none";
                return;
            }

            container.innerHTML = cart.map((item, index) => {
                total += item.price;
                return `
                    <div class="cart-card">
                        <img src="${item.localImg}" class="item-img" onerror="this.src='${item.webFallback}'">
                        <div class="item-info">
                            <h2>${item.displayName}</h2>
                            <div class="price">UGX ${item.price.toLocaleString()}</div>
                            <span class="mat-tag">${item.selectedMaterial} | LUX EXPRESS</span>
                        </div>
                        <i class="fas fa-times remove-icon" onclick="deleteItem(${index})"></i>
                    </div>`;
            }).join('');

            document.getElementById('sub-total-val').innerText = "UGX " + total.toLocaleString();
            localStorage.setItem('lux_final_sub', total);
        }

        window.deleteItem = (i) => {
            let cart = JSON.parse(localStorage.getItem('lux_cart'));
            cart.splice(i, 1);
            localStorage.setItem('lux_cart', JSON.stringify(cart));
            renderBag();
        };

        renderBag();
    </script>
</body>
</html>

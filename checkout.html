<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUX JEWELLERYZ | Secure Checkout</title>
    
    <!-- Icons & Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #D4AF37;
            --orange: #FF9800;
            --bg: #050505;
            --card: #0f0f0f;
            --border: #1a1a1a;
            --text-dim: #666;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; padding-bottom: 120px; }

        /* --- HEADER --- */
        header {
            padding: 20px;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .back-link { color: #fff; font-size: 18px; text-decoration: none; }
        header span { font-weight: 700; letter-spacing: 2px; font-size: 14px; text-transform: uppercase; }

        /* --- TOTAL BANNER --- */
        .total-banner {
            background: #111;
            padding: 20px;
            border-bottom: 4px solid #000;
            text-align: center;
        }
        .total-banner h2 { color: var(--gold); font-size: 26px; font-weight: 800; }
        .total-banner p { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; }

        /* --- CHECKOUT SECTIONS --- */
        .checkout-wrapper { padding: 20px; }
        
        .checkout-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .step-title {
            color: var(--gold);
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .step-title i { font-size: 16px; color: var(--orange); }

        /* --- FORM ELEMENTS --- */
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 10px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; margin-bottom: 8px; }
        input {
            width: 100%;
            background: #000;
            border: 1px solid #222;
            padding: 16px;
            color: #fff;
            border-radius: 8px;
            font-family: 'Montserrat';
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--gold); }

        /* --- PAYMENT METHOD DISPLAY --- */
        .payment-status {
            background: rgba(212, 175, 55, 0.05);
            border: 1px dashed var(--gold);
            padding: 18px;
            border-radius: 8px;
            text-align: center;
            color: var(--gold);
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 14px;
        }

        /* --- ORDER SUMMARY LIST --- */
        .summary-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 0;
            border-bottom: 1px solid #111;
        }
        .summary-img { width: 55px; height: 55px; border-radius: 6px; object-fit: cover; background: #111; }
        .summary-details { flex: 1; }
        .summary-details h4 { font-size: 13px; font-weight: 500; color: #eee; margin-bottom: 4px; }
        .summary-details p { font-size: 10px; color: var(--text-dim); }
        .summary-price { font-weight: 700; font-size: 14px; color: var(--gold); }

        /* --- BILLING TABLE --- */
        .billing-table { margin-top: 20px; }
        .bill-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; }
        .bill-label { color: var(--text-dim); }
        .bill-total {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #222;
            font-weight: 800;
            font-size: 20px;
            color: var(--gold);
        }

        /* --- FOOTER BUTTON --- */
        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #0a0a0a;
            padding: 15px 20px;
            border-top: 1px solid #222;
            box-sizing: border-box;
            z-index: 1000;
        }
        .place-order-btn {
            width: 100%;
            background: var(--orange);
            color: #fff;
            border: none;
            padding: 20px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 152, 0, 0.2);
        }
    </style>
</head>
<body>

    <header>
        <a href="cart.html" class="back-link"><i class="fas fa-chevron-left"></i></a>
        <span>Secure Checkout</span>
    </header>

    <div class="total-banner">
        <p>Final Amount to Pay</p>
        <h2 id="banner-grand-total">UGX 0</h2>
    </div>

    <div class="checkout-wrapper">
        
        <!-- STEP 1: DELIVERY -->
        <div class="checkout-card">
            <div class="step-title"><i class="fas fa-map-marker-alt"></i> 1. Delivery Information</div>
            
            <div class="form-group">
                <label>Recipient's Full Name</label>
                <input type="text" id="order-name" placeholder="Enter full name">
            </div>

            <div class="form-group">
                <label>Contact Phone (WhatsApp)</label>
                <input type="tel" id="order-phone" placeholder="e.g. 0700 000 000">
            </div>

            <div class="form-group">
                <label>Detailed Delivery Address</label>
                <input type="text" id="order-address" placeholder="Street / Plot / Area / Landmark">
            </div>
        </div>

        <!-- STEP 2: PAYMENT (FIXED TO CASH ON DELIVERY) -->
        <div class="checkout-card">
            <div class="step-title"><i class="fas fa-hand-holding-usd"></i> 2. Payment Method</div>
            <div class="payment-status">
                <i class="fas fa-money-bill-wave"></i>&nbsp; Cash on Delivery
            </div>
            <p style="font-size: 11px; color: #555; margin-top: 15px; text-align: center; line-height: 1.5;">
                Inspect your jewelry upon arrival and pay the agent in cash or via mobile money.
            </p>
        </div>

        <!-- STEP 3: SUMMARY -->
        <div class="checkout-card">
            <div class="step-title"><i class="fas fa-shopping-bag"></i> 3. Order Summary</div>
            
            <div id="order-summary-list">
                <!-- Injected via JS -->
            </div>

            <div class="billing-table">
                <div class="bill-row">
                    <span class="bill-label">Subtotal</span>
                    <span id="bill-sub">UGX 0</span>
                </div>
                <div class="bill-row">
                    <span class="bill-label">Delivery Fee</span>
                    <span>UGX 5,000</span>
                </div>
                <div class="bill-row bill-total">
                    <span>Grand Total</span>
                    <span id="bill-grand">UGX 0</span>
                </div>
            </div>
        </div>

        <p style="text-align:center; color:#333; font-size:10px; margin: 20px 0;">
            OFFICIAL LUX JEWELLERYZ CONCIERGE
        </p>

    </div>

    <footer>
        <button class="place-order-btn" onclick="processOrder()">Place Order</button>
    </footer>

    <script>
        // Data Retrieval
        const cart = JSON.parse(localStorage.getItem('lux_cart')) || [];
        const subtotal = parseInt(localStorage.getItem('lux_final_sub')) || 0;
        const deliveryFee = 5000;
        const grandTotal = subtotal + deliveryFee;

        // Render Summary
        const summaryList = document.getElementById('order-summary-list');
        if(cart.length > 0) {
            summaryList.innerHTML = cart.map(item => `
                <div class="summary-item">
                    <img src="${item.localImg}" class="summary-img" onerror="this.src='${item.webFallback}'">
                    <div class="summary-details">
                        <h4>${item.displayName}</h4>
                        <p>${item.selectedMaterial || 'Standard'}</p>
                    </div>
                    <div class="summary-price">UGX ${item.price.toLocaleString()}</div>
                </div>
            `).join('');
        }

        // Set Display Prices
        document.getElementById('banner-grand-total').innerText = "UGX " + grandTotal.toLocaleString();
        document.getElementById('bill-sub').innerText = "UGX " + subtotal.toLocaleString();
        document.getElementById('bill-grand').innerText = "UGX " + grandTotal.toLocaleString();

        function processOrder() {
            const name = document.getElementById('order-name').value;
            const phone = document.getElementById('order-phone').value;
            const address = document.getElementById('order-address').value;

            if(!name || !phone || !address) {
                alert("Missing Information: Please fill in your delivery details.");
                return;
            }

            // Constructing WhatsApp Message
            let msg = `*💎 NEW ORDER - LUX JEWELLERYZ*\n`;
            msg += `-----------------------------\n`;
            msg += `*Customer:* ${name}\n`;
            msg += `*Phone:* ${phone}\n`;
            msg += `*Address:* ${address}\n`;
            msg += `*Payment:* Cash on Delivery\n`;
            msg += `-----------------------------\n\n`;
            msg += `*ITEMS:*\n`;

            cart.forEach((item, index) => {
                msg += `${index + 1}. ${item.displayName} (${item.selectedMaterial}) - UGX ${item.price.toLocaleString()}\n`;
            });

            msg += `\n-----------------------------\n`;
            msg += `*Subtotal:* UGX ${subtotal.toLocaleString()}\n`;
            msg += `*Delivery:* UGX 5,000\n`;
            msg += `*TOTAL PAYABLE: UGX ${grandTotal.toLocaleString()}*\n`;
            msg += `-----------------------------\n`;
            msg += `_Sent via LUX Mobile Checkout_`;

            const waLink = `https://wa.me/256709441402?text=${encodeURIComponent(msg)}`;

            // Success action
            localStorage.removeItem('lux_cart');
            window.location.href = waLink;
        }
    </script>
</body>
</html>
